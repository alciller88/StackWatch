# StackWatch CI/CD — build, test, and release
#
# Code signing secrets (add in GitHub repo Settings > Secrets):
#   Windows:  CSC_LINK (base64 .pfx), CSC_KEY_PASSWORD
#   macOS:    APPLE_ID, APPLE_ID_PASSWORD, APPLE_TEAM_ID, CSC_LINK, CSC_KEY_PASSWORD
#   Linux:    (none required for unsigned AppImage)
#
# Release: push a tag like v0.5.0 to trigger the release job.

name: Build & Test

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Verify version consistency
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          echo "Package version: $PKG_VERSION"
          if [ -z "$PKG_VERSION" ]; then
            echo "ERROR: Could not read version from package.json"
            exit 1
          fi
          echo "Version check passed: $PKG_VERSION"

      - run: npm test
      - run: npm run test:coverage

  build:
    name: Build (${{ matrix.os }})
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: stackwatch-linux
          - os: windows-latest
            artifact: stackwatch-windows
          - os: macos-latest
            artifact: stackwatch-macos

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # TypeScript compile + Vite bundle + electron-builder package
      # Signing is skipped unless CSC_LINK / APPLE_ID secrets are set
      - run: npm run build:prod
      - run: npx electron-builder --publish never

      - name: Validate build
        run: npm run validate

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            out/*.exe
            out/*.dmg
            out/*.zip
            out/*.AppImage
            out/*.deb
            out/*.snap
          if-no-files-found: warn
          retention-days: 14

  release:
    name: Publish GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect release assets
        run: |
          mkdir -p release-assets
          find artifacts -type f \( -name '*.dmg' -o -name '*.zip' -o -name '*.exe' -o -name '*.AppImage' -o -name '*.deb' \) -exec cp {} release-assets/ \;
          ls -la release-assets/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "StackWatch ${{ github.ref_name }}"
          generate_release_notes: true
          draft: false
          prerelease: false
          files: release-assets/*
