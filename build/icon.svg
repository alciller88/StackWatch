<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="80" fill="#0e1420"/>
  <rect x="40" y="40" width="432" height="432" rx="60" fill="#111620" stroke="#1e2430" stroke-width="4"/>
  <g transform="translate(256,240)">
    <!-- Stack layers -->
    <path d="M-120,40 L0,-20 L120,40 L0,100 Z" fill="#1a2a3a" stroke="#e2b04a" stroke-width="3"/>
    <path d="M-120,0 L0,-60 L120,0 L0,60 Z" fill="#1a2a3a" stroke="#e2b04a" stroke-width="3"/>
    <path d="M-120,-40 L0,-100 L120,-40 L0,20 Z" fill="#1a2a3a" stroke="#e2b04a" stroke-width="3"/>
    <!-- Watch eye -->
    <circle cx="0" cy="-40" r="16" fill="none" stroke="#e2b04a" stroke-width="3"/>
    <circle cx="0" cy="-40" r="6" fill="#e2b04a"/>
  </g>
  <text x="256" y="420" text-anchor="middle" font-family="monospace" font-size="42" font-weight="bold" fill="#dce1e8" letter-spacing="6">STACKWATCH</text>
</svg>
